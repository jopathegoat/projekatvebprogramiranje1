<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NBA igrači 2025/26</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container py-5">
    <div class="app-box p-4 p-md-5">

      <div class="d-flex justify-content-end mb-2">
        <a href="logout.php" class="btn btn-outline-danger btn-sm">Odjavi se</a>
      </div>

      <div class="text-center mb-4">
        <h1 class="main-title">NBA igrači 2025/26</h1>

        <p class="text-muted mb-0">
          Unesi igrače, prati timove i statistiku za tekuću sezonu
        </p>
      </div>

      <div class="d-flex flex-column flex-md-row gap-3 justify-content-center mb-4">
        <button
          id="btnDodajPacijenta"
          class="btn btn-primary btn-lg px-4"
          type="button"
        >
          Dodaj igrača
        </button>

        <button
          id="btnPrikaziPacijente"
          class="btn btn-outline-dark btn-lg px-4"
          type="button"
        >
          Prikaži igrače
        </button>
      </div>

      <section id="formaSekcija">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">

            <h3 class="mb-4">Unos NBA igrača</h3>

            <form
              id="playerForm"
              class="row g-3"
              enctype="multipart/form-data"
            >

              <div class="col-12 col-md-6">
                <label for="ime" class="form-label">Ime i prezime</label>
                <input
                  type="text"
                  id="ime"
                  name="ime"
                  class="form-control"
                  placeholder="Unesi ime i prezime"
                />
              </div>

              <div class="col-12 col-md-3">
                <label for="godine" class="form-label">Godine</label>
                <input
                  type="number"
                  id="godine"
                  name="godine"
                  class="form-control"
                  placeholder="Npr. 25"
                />
              </div>

              <div class="col-12 col-md-3">
                <label for="pozicija" class="form-label">Pozicija</label>
                <select id="pozicija" name="pozicija" class="form-select">
                  <option value="PG">PG</option>
                  <option value="SG">SG</option>
                  <option value="SF">SF</option>
                  <option value="PF">PF</option>
                  <option value="C">C</option>
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="tim" class="form-label">Trenutni tim</label>
                <input
                  type="text"
                  id="tim"
                  name="tim"
                  class="form-control"
                  placeholder="Npr. Los Angeles Lakers"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="visina" class="form-label">Visina (m)</label>
                <input
                  type="number"
                  step="0.01"
                  id="visina"
                  name="visina"
                  class="form-control"
                  placeholder="Npr. 2.08"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="tezina" class="form-label">Težina (kg)</label>
                <input
                  type="number"
                  step="0.1"
                  id="tezina"
                  name="tezina"
                  class="form-control"
                  placeholder="Npr. 105"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="ppg" class="form-label">PPG (2025/26)</label>
                <input
                  type="number"
                  step="0.1"
                  id="ppg"
                  name="ppg"
                  class="form-control"
                  placeholder="Npr. 27.4"
                />
              </div>

              <div class="col-12 col-md-4">
                <label for="apg" class="form-label">APG (2025/26)</label>
                <input
                  type="number"
                  step="0.1"
                  id="apg"
                  name="apg"
                  class="form-control"
                  placeholder="Npr. 7.1"
                />
              </div>

              <div class="col-12 col-md-4">
                <label for="rpg" class="form-label">RPG (2025/26)</label>
                <input
                  type="number"
                  step="0.1"
                  id="rpg"
                  name="rpg"
                  class="form-control"
                  placeholder="Npr. 8.3"
                />
              </div>

              <div class="col-12 col-md-4">
                <label for="prstenovi" class="form-label">Broj prstenova</label>
                <input
                  type="number"
                  id="prstenovi"
                  name="prstenovi"
                  class="form-control"
                  placeholder="Npr. 4"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="slika" class="form-label">Slika igrača</label>
                <input
                  type="file"
                  id="slika"
                  name="slika"
                  class="form-control"
                  accept="image/*"
                />
              </div>

              <div class="col-12">
                <label for="napomena" class="form-label">Opis</label>
                <textarea
                  id="napomena"
                  name="napomena"
                  class="form-control"
                  rows="3"
                  placeholder="Dodatne informacije o igraču"
                ></textarea>
              </div>

              <div class="col-12 d-flex flex-column flex-sm-row gap-2">
                <button type="submit" class="btn btn-success px-4">
                  Sačuvaj igrača
                </button>

                <button type="reset" class="btn btn-secondary px-4">
                  Reset
                </button>
              </div>

            </form>

          </div>
        </div>
      </section>

      <section id="pacijentiSekcija" class="d-none mt-4">

        <div class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4">

            <div class="row g-3 align-items-end">

              <div class="col-12 col-md-4">
                <label for="filterPozicija" class="form-label">
                  Filtriraj po poziciji
                </label>

                <select id="filterPozicija" class="form-select">
                  <option value="Sve">Sve</option>
                  <option value="PG">PG</option>
                  <option value="SG">SG</option>
                  <option value="SF">SF</option>
                  <option value="PF">PF</option>
                  <option value="C">C</option>
                </select>
              </div>

              <div class="col-12 col-md-4">
                <label for="sortiranje" class="form-label">
                  Sortiranje po statistici
                </label>

                <select id="sortiranje" class="form-select">
                  <option value="default">Bez sortiranja</option>
                  <option value="ppg-asc">PPG rastuće</option>
                  <option value="ppg-desc">PPG opadajuće</option>
                  <option value="rings-desc">Prstenovi opadajuće</option>
                </select>
              </div>

              <div class="col-12 col-md-4">
                <button
                  id="btnPrimeni"
                  class="btn btn-primary w-100"
                  type="button"
                >
                  Primeni
                </button>
              </div>

            </div>

          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h3 class="mb-0">Lista NBA igrača</h3>

          <span id="brojPacijenata" class="badge text-bg-primary fs-6">
            0 NBA igrača
          </span>
        </div>

        <div id="patientsContainer" class="row g-4"></div>

      </section>

    </div>
  </div>

    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalUrediLabel">Uredi NBA igrača</h5>

          <form id="editForm" class="row g-3" enctype="multipart/form-data">
            <input type="hidden" id="editId" name="id" />

            <div class="col-12 col-md-6">
              <label for="editIme" class="form-label">Ime i prezime</label>
              <input type="text" id="editIme" name="ime" class="form-control" />

            <div class="col-12 col-md-3">
              <label for="editGodine" class="form-label">Godine</label>
              <input type="number" id="editGodine" name="godine" class="form-control" />

            <div class="col-12 col-md-3">
              <label for="editPozicija" class="form-label">Pozicija</label>
              <select id="editPozicija" name="pozicija" class="form-select">
                <option value="PG">PG</option>
                <option value="SG">SG</option>
                <option value="SF">SF</option>
                <option value="PF">PF</option>
                <option value="C">C</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label for="editTim" class="form-label">Trenutni tim</label>
              <input type="text" id="editTim" name="tim" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label for="editVisina" class="form-label">Visina (m)</label>
              <input type="number" step="0.01" id="editVisina" name="visina" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label for="editTezina" class="form-label">Težina (kg)</label>
              <input type="number" step="0.1" id="editTezina" name="tezina" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="editPpg" class="form-label">PPG (2025/26)</label>
              <input type="number" step="0.1" id="editPpg" name="ppg" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="editApg" class="form-label">APG (2025/26)</label>
              <input type="number" step="0.1" id="editApg" name="apg" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="editRpg" class="form-label">RPG (2025/26)</label>
              <input type="number" step="0.1" id="editRpg" name="rpg" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="editPrstenovi" class="form-label">Broj prstenova</label>
              <input type="number" id="editPrstenovi" name="prstenovi" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label for="editSlika" class="form-label">Nova slika igrača (opcionalno)</label>
              <input type="file" id="editSlika" name="slika" class="form-control" accept="image/*" />
            </div>

            <div class="col-12">
              <label for="editNapomena" class="form-label">Opis</label>
              <textarea id="editNapomena" name="napomena" class="form-control" rows="3"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
          <button type="button" class="btn btn-success" id="btnSacuvajIzmene">Sačuvaj izmene</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
